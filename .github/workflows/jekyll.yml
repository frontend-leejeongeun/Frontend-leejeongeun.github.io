# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"] # main 브랜치에 푸시할 때마다 실행
  workflow_dispatch: # 수동으로 워크플로우를 실행할 수 있도록 허용

permissions:
  contents: read # 코드 읽기 권한
  pages: write # GitHub Pages 배포 권한
  id-token: write # ID 토큰 권한

concurrency:
  group: "pages" # 페이지 그룹으로 설정하여 동시 배포를 방지
  cancel-in-progress: false # 진행 중인 작업을 취소하지 않음 (배포 완료까지 기다림)

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest # GitHub Actions에서 제공하는 Ubuntu 환경에서 실행
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 코드를 체크아웃하여 워크플로우 내에서 사용

      - name: Set up Ruby using ruby-build
        run: |
          sudo apt-get update  # 시스템 패키지 목록 업데이트
          sudo apt-get install -y git curl  # ruby-build를 클론하기 위한 필수 도구 설치
          git clone https://github.com/rbenv/ruby-build.git ~/.ruby-build  # ruby-build를 클론
          export PATH="$HOME/.ruby-build/bin:$PATH"  # ruby-build가 설치된 경로를 PATH에 추가
          ruby-build 3.1.4 /opt/hostedtoolcache/Ruby/3.1.4/x64  # Ruby 3.1.4 버전 설치
          touch /opt/hostedtoolcache/Ruby/3.1.4/x64.complete  # 설치 완료 표시 파일 생성

      - name: Install Bundler
        run: |
          gem install bundler  # Bundler 설치

      - name: Install dependencies
        run: |
          bundle install  # 프로젝트의 의존성 설치

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5 # GitHub Pages 설정

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}" # Jekyll로 사이트 빌드
        env:
          JEKYLL_ENV: production # Jekyll 빌드 환경을 production으로 설정

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # 빌드된 결과물을 GitHub Pages에 업로드

  # Deployment job
  deploy:
    environment:
      name: github-pages # GitHub Pages 환경으로 배포
      url: ${{ steps.deployment.outputs.page_url }} # 배포된 페이지 URL
    runs-on: ubuntu-latest # GitHub Actions에서 제공하는 Ubuntu 환경에서 실행
    needs: build # build job이 완료된 후 실행
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # GitHub Pages에 배포
