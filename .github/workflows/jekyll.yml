name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby using ruby-build
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl libssl-dev libreadline-dev zlib1g-dev
          git clone https://github.com/rbenv/ruby-build.git ~/.ruby-build
          export PATH="$HOME/.ruby-build/bin:$PATH"
          ruby-build 3.2.0 /opt/hostedtoolcache/Ruby/3.2.0/x64
          touch /opt/hostedtoolcache/Ruby/3.2.0/x64.complete

      - name: Install Bundler
        run: |
          sudo gem install bundler  # Bundler를 시스템 전체에 설치
          echo "export PATH=\"$HOME/.gem/ruby/3.2.0/bin:$PATH\"" >> ~/.bashrc
          source ~/.bashrc
          which bundle

      - name: Install dependencies
        run: |
          export PATH="$HOME/.gem/ruby/3.2.0/bin:$PATH"
          cd $GITHUB_WORKSPACE
          bundle install

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: |
          cd $GITHUB_WORKSPACE
          bundle exec jekyll build --destination ./_site --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
