name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest # 윈도우 환경으로 변경

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ruby 3.1.0
        run: |
          # 기존 Ruby 3.0.x 경로 삭제
          $env:Path = $env:Path -replace "C:\\Ruby30-x64\\bin;", ""

          # Ruby 3.1.0을 수동으로 설치
          Invoke-WebRequest -Uri "https://github.com/oneclick/rubyinstaller2/releases/download/RubyInstaller-3.1.0-1/rubyinstaller-3.1.0-1-x64.exe" -OutFile "rubyinstaller-3.1.0-1-x64.exe"
          Start-Process -Wait -FilePath "rubyinstaller-3.1.0-1-x64.exe" -ArgumentList "/silent"

          # Ruby 3.1 경로를 환경 변수에 추가
          # GitHub Actions에서 사용하는 기본 경로: C:\hostedtoolcache\windows\Ruby\3.1.x\x64\bin
          $env:Path += ";C:\hostedtoolcache\windows\Ruby\3.1.0\x64\bin"

          # 새 세션을 시작하여 경로가 반영되도록 강제
          RefreshEnv.cmd

          # Ruby 버전 확인
          ruby -v  # Ruby 3.1.0이 제대로 설치되었는지 확인

          # 환경 변수 경로 확인
          echo "Current PATH: $env:Path"  # 환경 변수에 설정된 경로 출력

          # Bundler 설치
          gem install bundler
          gem -v  # Bundler 버전 확인

      - name: Install dependencies
        run: |
          # Ruby 경로가 반영되었는지 확인
          echo "Verifying Ruby Version..."
          ruby -v  # Ruby 버전 확인

          cd ${{ github.workspace }}  # GitHub Workspace로 이동
          bundle install  # 의존성 설치

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: |
          cd ${{ github.workspace }}  # GitHub Workspace로 이동
          bundle exec jekyll build --destination ./_site --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: windows-latest # 윈도우 환경으로 변경
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
